<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck™ — Grupo CSV</title>
    <link rel="icon" href="/assets/favicons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png">
    <meta name="description" content="Deck™ — Painel de contexto ativo | Grupo CSV">
    <meta property="og:title" content="Deck™ — Grupo CSV">
    <meta property="og:description" content="Seu painel de contexto ativo. Organize o que está em aberto agora.">
    <meta property="og:image" content="https://hub.grupocsv.com/og/og_hub.png">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ══ Reset ══ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ══ Variáveis de tema ══ */
        :root {
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --radius: 14px;
            --radius-sm: 8px;
            --transition: 180ms ease;
            --grad-start: #0f2b46;
            --grad-mid: #196396;
            --grad-end: #2DBF7F;
            --accent-gradient: linear-gradient(135deg, var(--grad-mid), var(--grad-end));
        }

        [data-theme="dark"] {
            --bg: #0a0d14;
            --bg-surface: #111620;
            --bg-card: #161c28;
            --bg-input: #0f1319;
            --text: #e8ebf2;
            --text-secondary: #94a0b8;
            --text-muted: #4a5268;
            --border: #1e2538;
            --border-hover: #2e3650;
            --accent: #2DBF7F;
            --accent-secondary: #196396;
            --accent-soft: rgba(45,191,127,0.10);
            --danger: #ef4444;
            --shadow: 0 4px 24px rgba(0,0,0,0.5);
            --card-glow: 0 0 0 1px rgba(25,99,150,0.12);
            --topbar-bg: rgba(10,13,20,0.92);
            --topbar-border: rgba(45,191,127,0.08);
        }

        [data-theme="light"] {
            --bg: #f2f4f7;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f5f7fa;
            --text: #0f2b46;
            --text-secondary: #4a6280;
            --text-muted: #8a9ab0;
            --border: #dce3ec;
            --border-hover: #bcc8d8;
            --accent: #196396;
            --accent-secondary: #2DBF7F;
            --accent-soft: rgba(25,99,150,0.08);
            --danger: #dc2626;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --card-glow: 0 1px 4px rgba(0,0,0,0.06);
            --topbar-bg: rgba(255,255,255,0.92);
            --topbar-border: rgba(25,99,150,0.10);
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            transition: background 300ms ease, color 300ms ease;
        }
        button { cursor: pointer; font-family: var(--font); }
        input, textarea, select { font-family: var(--font); }
        .hidden { display: none !important; }

        /* ══ Tela de bloqueio ══ */
        #lock-screen {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        #lock-screen::before {
            content: '';
            position: absolute;
            top: -40%; left: -20%; width: 140%; height: 180%;
            background: radial-gradient(ellipse at 30% 30%, rgba(25,99,150,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 70%, rgba(45,191,127,0.06) 0%, transparent 50%);
            pointer-events: none;
        }
        .lock-box {
            position: relative;
            z-index: 1;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 44px 40px;
            width: 400px; max-width: 92vw;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .lock-logo {
            height: 30px;
            margin-bottom: 28px;
            opacity: 0.5;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        [data-theme="dark"] .lock-logo { content: url('/assets/visual-identity/grupo-csv/logo/png/grupo-csv_logo_horizontal_full-color_negative_transparent.png'); }
        .lock-icon {
            width: 44px; height: 44px;
            margin: 0 auto 18px;
            display: block;
        }
        .lock-icon .lock-body { fill: none; stroke: var(--accent); stroke-width: 2; }
        .lock-icon .lock-shackle { fill: none; stroke: var(--accent); stroke-width: 2; }
        #lock-title {
            font-size: 22px; font-weight: 700;
            margin-bottom: 4px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .lock-slogan {
            font-size: 12px; color: var(--text-muted);
            margin-bottom: 6px; letter-spacing: 0.03em;
        }
        #lock-subtitle {
            font-size: 13px; color: var(--text-secondary);
            margin-bottom: 22px;
        }
        #pin-group {
            display: flex; gap: 10px; justify-content: center;
            margin-bottom: 18px;
        }
        #pin-group input {
            width: 52px; height: 52px;
            text-align: center; font-size: 20px; font-weight: 700;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            outline: none;
            transition: border-color var(--transition);
            -webkit-text-security: disc;
        }
        #pin-group input:focus { border-color: var(--accent); }
        #lock-btn {
            width: 100%; padding: 13px;
            background: var(--accent-gradient);
            color: #fff; font-weight: 600; font-size: 14px;
            border: none; border-radius: var(--radius-sm);
            transition: opacity var(--transition), transform var(--transition);
        }
        #lock-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        #lock-error {
            color: var(--danger); font-size: 12px;
            margin-top: 10px; min-height: 18px;
        }
        #lock-footer {
            margin-top: 14px; font-size: 12px;
        }
        #lock-footer a {
            color: var(--text-muted); cursor: pointer;
            text-decoration: underline;
            transition: color var(--transition);
        }
        #lock-footer a:hover { color: var(--text-secondary); }

        /* ══ Animação de boas-vindas ══ */
        #welcome-overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg);
            opacity: 1;
            transition: opacity 600ms ease;
        }
        #welcome-overlay.fade-out { opacity: 0; pointer-events: none; }
        .welcome-text {
            font-size: 28px; font-weight: 300;
            letter-spacing: -0.01em;
            color: var(--text);
            opacity: 0;
            transform: translateY(12px);
            animation: welcomeFadeIn 800ms ease forwards;
        }
        .welcome-text strong {
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @keyframes welcomeFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ══ Barra superior ══ */
        .topbar {
            display: flex; align-items: center;
            padding: 0 24px; height: 54px;
            background: var(--topbar-bg);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--topbar-border);
            position: sticky; top: 0; z-index: 100;
        }
        .topbar-left {
            display: flex; align-items: center; gap: 12px;
            flex: 1;
        }
        .topbar-brand {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none;
        }
        .topbar-brand-logo {
            height: 20px;
            opacity: 0.45;
            transition: opacity var(--transition);
        }
        [data-theme="dark"] .topbar-brand-logo { content: url('/assets/visual-identity/grupo-csv/logo/png/grupo-csv_logo_horizontal_full-color_negative_transparent.png'); }
        .topbar-brand:hover .topbar-brand-logo { opacity: 0.65; }
        .topbar-divider {
            width: 1px; height: 22px;
            background: var(--border);
        }
        .topbar-title {
            font-size: 18px; font-weight: 800;
            letter-spacing: -0.02em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .topbar-title sup {
            font-size: 9px; font-weight: 600;
            -webkit-text-fill-color: var(--text-muted);
        }
        .topbar-badge {
            font-size: 11px; font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--accent-soft);
            color: var(--accent);
            margin-left: 8px;
        }
        .topbar-slogan {
            font-size: 10.5px;
            font-weight: 400;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-left: 16px;
            display: none;
        }
        @media (min-width: 900px) {
            .topbar-slogan { display: block; }
        }
        .topbar-center {
            position: absolute;
            left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 12px;
            font-size: 13px; color: var(--text-secondary);
            white-space: nowrap;
        }
        .topbar-date-sep { color: var(--text-muted); margin: 0 1px; }
        .topbar-clock {
            font-size: 13px; font-weight: 500;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }
        .topbar-right {
            display: flex; align-items: center; gap: 6px;
            margin-left: auto;
        }
        .topbar-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 12.5px; font-weight: 500;
            transition: all var(--transition);
        }
        .topbar-btn:hover {
            border-color: var(--border-hover);
            color: var(--text);
            background: var(--accent-soft);
        }
        .topbar-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
        .topbar-btn-primary {
            background: var(--accent-gradient);
            border: none;
            color: #fff;
            font-weight: 600;
        }
        .topbar-btn-primary:hover {
            opacity: 0.9;
            background: var(--accent-gradient);
            color: #fff;
        }
        .topbar-btn-icon {
            width: 34px; height: 34px;
            padding: 0;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            transition: all var(--transition);
        }
        .topbar-btn-icon:hover {
            color: var(--text);
            background: var(--accent-soft);
            border-color: var(--border);
        }
        .topbar-btn-icon svg { width: 17px; height: 17px; }

        /* ══ Quadro de cards ══ */
        .board {
            padding: 28px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        @media (max-width: 600px) {
            .board { padding: 16px; grid-template-columns: 1fr; }
        }

        /* ══ Card ══ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex; flex-direction: column; gap: 14px;
            position: relative;
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
            border-left: 5px solid var(--card-color, var(--accent));
            min-height: 250px;
            box-shadow: var(--card-glow);
            cursor: grab;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 100%;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--card-color, var(--accent)), transparent 65%);
            opacity: 0.05;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
        }
        .card:hover::before { opacity: 0.08; }
        .card.sortable-ghost { opacity: 0.35; }
        .card.sortable-chosen { box-shadow: 0 8px 36px rgba(0,0,0,0.35); cursor: grabbing; }

        /* Card destacado */
        .card.highlighted {
            border-color: var(--card-color, var(--accent));
            box-shadow: 0 0 0 1px var(--card-color, var(--accent)),
                        0 0 20px rgba(var(--card-color-rgb, 45,191,127), 0.20),
                        0 0 40px rgba(var(--card-color-rgb, 45,191,127), 0.08);
        }
        .card.highlighted::before { opacity: 0.12; }
        .card.highlighted::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: var(--radius);
            border: 1.5px solid var(--card-color, var(--accent));
            opacity: 0.5;
            pointer-events: none;
            animation: highlightPulse 2s ease-in-out infinite;
        }
        @keyframes highlightPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
        }
        .card-platform-wrapper {
            position: relative;
            display: inline-flex;
        }
        .card-platform-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 11.5px; font-weight: 600;
            padding: 4px 12px;
            border-radius: 6px;
            letter-spacing: 0.02em;
            white-space: nowrap;
            pointer-events: none;
        }
        .card-platform-badge .badge-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }
        .card-platform-select {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            font-size: 14px;
        }
        .card-actions {
            display: flex; align-items: center; gap: 4px;
        }
        .card-action-btn {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: var(--text-muted);
            transition: all var(--transition);
            flex-shrink: 0;
            opacity: 0.5;
        }
        .card:hover .card-action-btn { opacity: 1; }
        .card-action-btn:hover {
            background: var(--accent-soft);
            color: var(--text);
        }
        .card-action-btn.btn-highlight.active {
            color: var(--card-color, var(--accent));
            opacity: 1;
        }
        .card-action-btn.btn-remove:hover {
            background: rgba(239,68,68,0.10);
            color: var(--danger);
        }
        .card-action-btn svg { width: 14px; height: 14px; }
        .card-title {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 15px; font-weight: 600;
            padding: 8px 0;
            outline: none;
            transition: border-color var(--transition);
        }
        .card-title:focus { border-color: var(--accent); }
        .card-title::placeholder { color: var(--text-muted); font-weight: 400; }
        .card-notes {
            flex: 1;
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 13px;
            padding: 12px;
            resize: none;
            outline: none;
            min-height: 80px;
            max-height: 160px;
            line-height: 1.6;
            transition: border-color var(--transition), color var(--transition);
        }
        .card-notes:focus {
            border-color: var(--accent);
            color: var(--text);
        }
        .card-notes::placeholder { color: var(--text-muted); }
        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 10.5px;
            color: var(--text-muted);
            letter-spacing: 0.01em;
            opacity: 0.7;
        }

        /* ══ Botão novo card ══ */
        .card-new {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 10px;
            min-height: 250px;
            background: transparent;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            color: var(--text-muted);
            font-size: 13px; font-weight: 500;
            transition: all var(--transition);
        }
        .card-new:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }
        .card-new svg { width: 26px; height: 26px; }

        /* ══ Estado vazio ══ */
        .empty-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
        .empty-state svg { width: 56px; height: 56px; margin-bottom: 18px; opacity: 0.3; }
        .empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .empty-state p { font-size: 13px; }

        /* ══ Menu de configurações ══ */
        .settings-menu {
            position: absolute;
            top: 54px; right: 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 0;
            min-width: 210px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
            z-index: 200;
        }
        .settings-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 18px;
            background: transparent;
            border: none;
            width: 100%;
            color: var(--text-secondary);
            font-size: 13px; font-weight: 400;
            text-align: left;
            transition: all var(--transition);
        }
        .settings-item:hover {
            background: var(--accent-soft);
            color: var(--text);
        }
        .settings-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.6; }
        .settings-sep {
            height: 1px;
            background: var(--border);
            margin: 6px 0;
        }

        /* ══ Modais ══ */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.55);
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 32px;
            width: 480px; max-width: 94vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 17px; font-weight: 700;
            margin-bottom: 18px;
            color: var(--text);
        }
        .modal-label {
            display: block;
            font-size: 12px; font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .modal-input {
            width: 100%; padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            outline: none;
            margin-bottom: 14px;
            transition: border-color var(--transition);
        }
        .modal-input:focus { border-color: var(--accent); }
        .modal-actions {
            display: flex; gap: 10px; justify-content: flex-end;
            margin-top: 20px;
        }
        .modal-btn {
            padding: 9px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 600;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            transition: all var(--transition);
        }
        .modal-btn:hover { background: var(--accent-soft); color: var(--text); }
        .modal-btn-primary {
            background: var(--accent-gradient);
            border: none;
            color: #fff;
        }
        .modal-btn-primary:hover { opacity: 0.9; }
        .modal-status {
            font-size: 12px; margin-top: 10px; min-height: 18px;
        }
        .modal-status.success { color: var(--accent); }
        .modal-status.error { color: var(--danger); }

        /* ══ Captura de tela ══ */
        .screenshot-preview {
            width: 100%;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .screenshot-stamp {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-align: center;
        }

        /* ══ Toast ══ */
        .toast {
            position: fixed;
            bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 22px;
            display: flex; align-items: center; gap: 14px;
            font-size: 13px; font-weight: 500;
            color: var(--text);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            opacity: 0;
            transition: all 300ms ease;
            z-index: 600;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .toast-undo {
            padding: 5px 14px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 12px; font-weight: 600;
            cursor: pointer;
            transition: opacity var(--transition);
        }

</head>

<script>
/* ══════════════════════════════════════════════════════════════
   Deck™ — Painel de Contexto Ativo
   Grupo CSV | hub.grupocsv.com/deck
   ══════════════════════════════════════════════════════════════ */
(() => {
'use strict';

const STORAGE_KEY = 'deck_state';
const PIN_KEY = 'deck_pin';
const THEME_KEY = 'deck_theme';
const EMAIL_API = 'https://csv-email.guilherme-thom.workers.dev';
const EMAIL_TO = 'guilherme@grupocsv.com';
const UNDO_TIMEOUT = 7000;

const DEFAULT_PLATFORMS = [
    { id: 'manus',         name: 'Manus',          color: '#6C5CE7', builtin: true },
    { id: 'chatgpt',       name: 'ChatGPT',        color: '#10A37F', builtin: true },
    { id: 'claude',        name: 'Claude',          color: '#D97706', builtin: true },
    { id: 'claude-cowork', name: 'Claude Cowork',   color: '#F59E0B', builtin: true },
    { id: 'anti-gravity',  name: 'Anti-Gravity',    color: '#3B82F6', builtin: true },
    { id: 'email',         name: 'E-mail',          color: '#EF4444', builtin: true },
    { id: 'chrome',        name: 'Chrome (aba)',    color: '#6B7280', builtin: true },
    { id: 'whatsapp',      name: 'WhatsApp',        color: '#25D366', builtin: true },
    { id: 'outro',         name: 'Outro',           color: '#9CA3AF', builtin: true },
];

const WEEKDAYS = ['Domingo','Segunda-feira','Ter\u00e7a-feira','Quarta-feira','Quinta-feira','Sexta-feira','S\u00e1bado'];
const MONTHS = ['janeiro','fevereiro','mar\u00e7o','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

let state = { cards: [], platforms: [] };

const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

const lockScreen = $('#lock-screen');
const lockTitle = $('#lock-title');
const lockSubtitle = $('#lock-subtitle');
const lockBtn = $('#lock-btn');
const lockError = $('#lock-error');
const lockFooter = $('#lock-footer');
const pinGroup = $('#pin-group');
const pinInputs = $$('input', pinGroup);
const app = $('#app');
const board = $('#board');
const cardCount = $('#card-count');
const settingsMenu = $('#settings-menu');
const toastEl = $('#toast');
const toastText = $('#toast-text');
const welcomeOverlay = $('#welcome-overlay');

// ── Utilitários ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

async function hashPin(pin) {
    const data = new TextEncoder().encode(pin + '_deck_salt');
    const buf = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function showToast(msg, duration = 2800) {
    toastText.textContent = msg;
    const existing = toastEl.querySelector('.toast-undo');
    if (existing) existing.remove();
    toastEl.classList.add('show');
    clearTimeout(toastEl._hideTimer);
    toastEl._hideTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
}

function showUndoToast(msg, onUndo) {
    toastText.textContent = msg;
    const existing = toastEl.querySelector('.toast-undo');
    if (existing) existing.remove();
    const btn = document.createElement('button');
    btn.className = 'toast-undo';
    btn.textContent = 'Desfazer';
    btn.onclick = () => { onUndo(); toastEl.classList.remove('show'); clearTimeout(toastEl._hideTimer); };
    toastEl.appendChild(btn);
    toastEl.classList.add('show');
    clearTimeout(toastEl._hideTimer);
    toastEl._hideTimer = setTimeout(() => toastEl.classList.remove('show'), UNDO_TIMEOUT);
}

function formatDateTimeFull() {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    const weekday = WEEKDAYS[d.getDay()];
    const day = pad(d.getDate());
    const month = MONTHS[d.getMonth()];
    const year = d.getFullYear();
    const h = pad(d.getHours());
    const m = pad(d.getMinutes());
    return `${weekday}, ${day} de ${month} de ${year} \u00e0s ${h}:${m}`;
}

function formatDateTimeShort() {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function formatCardTimestamp(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ── Data e relógio ──
function updateDateTime() {
    const now = new Date();
    const weekday = WEEKDAYS[now.getDay()];
    const day = String(now.getDate()).padStart(2, '0');
    const month = MONTHS[now.getMonth()];
    const year = now.getFullYear();
    const dateEl = $('#topbar-date');
    const clockEl = $('#topbar-clock');
    if (dateEl) dateEl.innerHTML = `${weekday} <span class="topbar-date-sep">|</span> ${day} de ${month} de ${year}`;
    if (clockEl) {
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        clockEl.textContent = `${h}:${m}`;
    }
}

// ── Tema ──
function getTheme() { return localStorage.getItem(THEME_KEY) || 'dark'; }

function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(THEME_KEY, theme);
    $('#icon-theme-dark').classList.toggle('hidden', theme !== 'dark');
    $('#icon-theme-light').classList.toggle('hidden', theme !== 'light');
}

function toggleTheme() { setTheme(getTheme() === 'dark' ? 'light' : 'dark'); }

// ── Tela cheia ──
function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen().catch(() => {});
}

// ── Persistência ──
function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e) { console.error('Deck: falha ao salvar', e); }
}

function loadState() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            const parsed = JSON.parse(raw);
            state.cards = Array.isArray(parsed.cards) ? parsed.cards : [];
            state.platforms = Array.isArray(parsed.platforms) ? parsed.platforms : [];
        }
    } catch(e) { state = { cards: [], platforms: [] }; }
}

function getAllPlatforms() { return [...DEFAULT_PLATFORMS, ...state.platforms]; }
function getPlatformColor(id) { const p = getAllPlatforms().find(x => x.id === id); return p ? p.color : '#9CA3AF'; }
function getPlatformName(id) { const p = getAllPlatforms().find(x => x.id === id); return p ? p.name : 'Outro'; }

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return { r, g, b };
}

function platformBadgeStyle(color) {
    const { r, g, b } = hexToRgb(color);
    const theme = getTheme();
    const alpha = theme === 'dark' ? 0.14 : 0.10;
    return `background:rgba(${r},${g},${b},${alpha});color:${color};`;
}

// ── PIN / Bloqueio ──
function isPinSet() { return !!localStorage.getItem(PIN_KEY); }

function setupLockScreen() {
    if (!isPinSet()) {
        lockTitle.textContent = 'Criar PIN';
        lockSubtitle.textContent = 'Defina um PIN de 4 d\u00edgitos para proteger seu Deck';
        lockBtn.textContent = 'Definir PIN';
        lockFooter.innerHTML = '';
        lockBtn.onclick = handleSetPin;
    } else {
        lockTitle.textContent = 'Deck\u2122';
        lockSubtitle.textContent = 'Digite seu PIN de 4 d\u00edgitos para acessar';
        lockBtn.textContent = 'Desbloquear';
        lockFooter.innerHTML = '<a id="reset-pin-link">Esqueceu o PIN?</a>';
        const rl = $('#reset-pin-link');
        if (rl) rl.onclick = handleResetPin;
        lockBtn.onclick = handleUnlock;
    }
    pinInputs[0].focus();
}

function getPinValue() { return pinInputs.map(i => i.value).join(''); }
function clearPinInputs() { pinInputs.forEach(i => { i.value = ''; }); pinInputs[0].focus(); }

async function handleSetPin() {
    const pin = getPinValue();
    if (pin.length !== 4 || !/^\d{4}$/.test(pin)) { lockError.textContent = 'Digite exatamente 4 d\u00edgitos num\u00e9ricos.'; return; }
    localStorage.setItem(PIN_KEY, await hashPin(pin));
    lockError.textContent = '';
    unlock();
}

async function handleUnlock() {
    const pin = getPinValue();
    if (pin.length !== 4) { lockError.textContent = 'Digite 4 d\u00edgitos.'; return; }
    if (await hashPin(pin) === localStorage.getItem(PIN_KEY)) { lockError.textContent = ''; unlock(); }
    else { lockError.textContent = 'PIN incorreto.'; clearPinInputs(); }
}

function handleResetPin() {
    if (confirm('Ao redefinir o PIN, todos os dados do Deck ser\u00e3o apagados. Deseja continuar?')) {
        localStorage.removeItem(PIN_KEY);
        localStorage.removeItem(STORAGE_KEY);
        state = { cards: [], platforms: [] };
        clearPinInputs();
        setupLockScreen();
    }
}

function unlock() {
    lockScreen.classList.add('hidden');
    // Animação de boas-vindas
    welcomeOverlay.classList.remove('hidden');
    setTimeout(() => welcomeOverlay.classList.add('fade-out'), 1200);
    setTimeout(() => {
        welcomeOverlay.classList.add('hidden');
        welcomeOverlay.classList.remove('fade-out');
        app.classList.remove('hidden');
        loadState();
        renderBoard();
        updateDateTime();
    }, 1900);
}

pinInputs.forEach((inp, idx) => {
    inp.addEventListener('input', () => {
        inp.value = inp.value.replace(/\\D/g, '').slice(0, 1);
        if (inp.value && idx < 3) pinInputs[idx + 1].focus();
    });
    inp.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !inp.value && idx > 0) pinInputs[idx - 1].focus();
        if (e.key === 'Enter') lockBtn.click();
    });
});

// ── Renderização do quadro ──
function renderBoard() {
    board.innerHTML = '';
    if (state.cards.length === 0) {
        board.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                <h3>Nenhum registro ativo</h3>
                <p>Clique em \u201cNovo\u201d para come\u00e7ar</p>
            </div>`;
    } else {
        state.cards.forEach(card => board.appendChild(createCardElement(card)));
    }
    const newBtn = document.createElement('button');
    newBtn.className = 'card-new';
    newBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Novo`;
    newBtn.onclick = addCard;
    board.appendChild(newBtn);
    updateCardCount();
    initSortable();
}

function createCardElement(card) {
    const el = document.createElement('div');
    el.className = 'card' + (card.highlighted ? ' highlighted' : '');
    el.dataset.id = card.id;
    const color = getPlatformColor(card.platform);
    const { r, g, b } = hexToRgb(color);
    el.style.setProperty('--card-color', color);
    el.style.setProperty('--card-color-rgb', `${r},${g},${b}`);

    const platforms = getAllPlatforms();
    const optionsHtml = platforms.map(p => `<option value="${p.id}" ${p.id === card.platform ? 'selected' : ''}>${p.name}</option>`).join('');
    const badgeStyle = platformBadgeStyle(color);
    const platformName = getPlatformName(card.platform);
    const createdStr = card.created ? formatCardTimestamp(card.created) : '';

    el.innerHTML = `
        <div class="card-header">
            <div class="card-platform-wrapper">
                <div class="card-platform-badge" style="${badgeStyle}">
                    <span class="badge-dot"></span>
                    <span class="badge-name">${escapeHtml(platformName)}</span>
                </div>
                <select class="card-platform-select" data-field="platform">${optionsHtml}</select>
            </div>
            <div class="card-actions">
                <button class="card-action-btn btn-highlight ${card.highlighted ? 'active' : ''}" title="Destacar">
                    <svg viewBox="0 0 24 24" fill="${card.highlighted ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </button>
                <button class="card-action-btn btn-remove" title="Remover">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
        </div>
        <input class="card-title" type="text" placeholder="O que est\u00e1 em aberto agora" value="${escapeHtml(card.title || '')}" data-field="title" autocomplete="off">
        <textarea class="card-notes" placeholder="Descri\u00e7\u00e3o" data-field="notes">${escapeHtml(card.notes || '')}</textarea>
        <div class="card-footer">
            <span>Aberto em ${createdStr}</span>
        </div>
    `;

    // Plataforma
    const sel = $('[data-field="platform"]', el);
    sel.addEventListener('change', () => {
        card.platform = sel.value;
        const nc = getPlatformColor(card.platform);
        const { r: nr, g: ng, b: nb } = hexToRgb(nc);
        el.style.setProperty('--card-color', nc);
        el.style.setProperty('--card-color-rgb', `${nr},${ng},${nb}`);
        $('.card-platform-badge', el).setAttribute('style', platformBadgeStyle(nc));
        $('.badge-name', el).textContent = getPlatformName(card.platform);
        saveState();
    });

    // Título
    const titleInput = $('[data-field="title"]', el);
    titleInput.addEventListener('input', () => { card.title = titleInput.value; saveState(); });

    // Notas
    const notesInput = $('[data-field="notes"]', el);
    notesInput.addEventListener('input', () => { card.notes = notesInput.value; saveState(); });

    // Destacar
    const hlBtn = $('.btn-highlight', el);
    hlBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        card.highlighted = !card.highlighted;
        el.classList.toggle('highlighted', card.highlighted);
        hlBtn.classList.toggle('active', card.highlighted);
        hlBtn.querySelector('svg').setAttribute('fill', card.highlighted ? 'currentColor' : 'none');
        saveState();
    });

    // Remover com desfazer
    const removeBtn = $('.btn-remove', el);
    removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = state.cards.findIndex(c => c.id === card.id);
        if (idx === -1) return;
        const removed = state.cards.splice(idx, 1)[0];
        saveState();
        renderBoard();
        showUndoToast(`\u201c${removed.title || 'Sem t\u00edtulo'}\u201d removido`, () => {
            state.cards.splice(idx, 0, removed);
            saveState();
            renderBoard();
        });
    });

    return el;
}

function updateCardCount() {
    const n = state.cards.length;
    cardCount.textContent = n === 0 ? '0' : n === 1 ? '1' : String(n);
}

function addCard() {
    const card = { id: uid(), platform: 'manus', title: '', notes: '', created: Date.now(), highlighted: false };
    state.cards.push(card);
    saveState();
    renderBoard();
    const newEl = $(`[data-id="${card.id}"] .card-title`);
    if (newEl) newEl.focus();
}

// ── Sortable (arraste pelo card inteiro) ──
let sortableInstance = null;
function initSortable() {
    if (sortableInstance) sortableInstance.destroy();
    if (state.cards.length === 0) return;
    sortableInstance = new Sortable(board, {
        animation: 200,
        draggable: '.card',
        filter: 'input, textarea, select, button',
        preventOnFilter: false,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        onEnd: () => {
            const ids = $$('.card', board).map(el => el.dataset.id);
            state.cards.sort((a, b) => ids.indexOf(a.id) - ids.indexOf(b.id));
            saveState();
        }
    });
}

// ── Confirmação ──
function showConfirm(title, message, onOk) {
    const modal = $('#confirm-modal');
    $('#confirm-title').textContent = title;
    $('#confirm-message').textContent = message;
    modal.classList.remove('hidden');
    const close = () => modal.classList.add('hidden');
    $('#confirm-cancel').onclick = close;
    $('#confirm-ok').onclick = () => { close(); onOk(); };
    modal.onclick = (e) => { if (e.target === modal) close(); };
}

// ── Captura de tela ──
$('#btn-screenshot').addEventListener('click', async () => {
    const statusEl = $('#screenshot-status');
    statusEl.textContent = ''; statusEl.className = 'modal-status';
    try {
        const bgColor = getComputedStyle(document.body).backgroundColor;
        const canvas = await html2canvas(board, { backgroundColor: bgColor, scale: 2, useCORS: true, logging: false });
        const dataUrl = canvas.toDataURL('image/png');
        $('#screenshot-preview').src = dataUrl;
        $('#screenshot-stamp').textContent = formatDateTimeFull();
        $('#screenshot-modal').classList.remove('hidden');
    } catch(e) { showToast('Erro ao capturar tela'); console.error(e); }
});

$('#screenshot-cancel').addEventListener('click', () => $('#screenshot-modal').classList.add('hidden'));
$('#screenshot-modal').addEventListener('click', (e) => { if (e.target.id === 'screenshot-modal') $('#screenshot-modal').classList.add('hidden'); });

$('#screenshot-download').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = $('#screenshot-preview').src;
    a.download = `deck-${new Date().toISOString().slice(0,10)}.png`;
    a.click();
    showToast('Imagem salva');
});

$('#screenshot-send').addEventListener('click', async () => {
    const statusEl = $('#screenshot-status');
    const sendBtn = $('#screenshot-send');
    statusEl.textContent = 'Enviando...'; statusEl.className = 'modal-status';
    sendBtn.disabled = true;
    try {
        const dataUrl = $('#screenshot-preview').src;
        const base64 = dataUrl.split(',')[1];
        const dt = formatDateTimeFull();
        const res = await fetch(EMAIL_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                to: EMAIL_TO,
                subject: `Deck\u2122 \u2014 ${formatDateTimeShort()}`,
                from_name: 'Deck\u2122',
                from_email: 'hub@mail.grupocsv.com',
                html: `<p>Captura do Deck\u2122 em ${dt}</p><p><img src="cid:deck-screenshot" style="max-width:100%;border-radius:8px"></p>`,
                text: `Captura do Deck\u2122 em ${dt}`,
                attachments: [{ filename: `deck-${new Date().toISOString().slice(0,10)}.png`, content: base64, content_type: 'image/png' }]
            })
        });
        const data = await res.json();
        if (res.ok && data.success) {
            statusEl.textContent = 'E-mail enviado com sucesso.'; statusEl.className = 'modal-status success';
            setTimeout(() => $('#screenshot-modal').classList.add('hidden'), 1800);
        } else {
            statusEl.textContent = `Erro: ${data.error || 'falha no envio'}`; statusEl.className = 'modal-status error';
        }
    } catch(e) {
        statusEl.textContent = 'Erro de conex\u00e3o. Tente novamente.'; statusEl.className = 'modal-status error';
    } finally { sendBtn.disabled = false; }
});

// ── ESC fecha modais ──
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        $$('.modal-overlay').forEach(m => m.classList.add('hidden'));
        settingsMenu.classList.add('hidden');
    }
});

// ── Configurações ──
$('#btn-settings').addEventListener('click', (e) => { e.stopPropagation(); settingsMenu.classList.toggle('hidden'); });
document.addEventListener('click', () => settingsMenu.classList.add('hidden'));
settingsMenu.addEventListener('click', (e) => e.stopPropagation());

$('#btn-new-card').addEventListener('click', addCard);
$('#btn-fullscreen').addEventListener('click', toggleFullscreen);
$('#btn-theme').addEventListener('click', toggleTheme);

// ── Exportar ──
$('#btn-export').addEventListener('click', () => {
    settingsMenu.classList.add('hidden');
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `deck-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
    showToast('Backup exportado');
});

// ── Importar ──
const importFile = $('#import-file');
$('#btn-import').addEventListener('click', () => { settingsMenu.classList.add('hidden'); importFile.click(); });
importFile.addEventListener('change', (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported.cards)) throw new Error('Formato inv\u00e1lido');
            state.cards = imported.cards;
            state.platforms = Array.isArray(imported.platforms) ? imported.platforms : [];
            saveState(); renderBoard();
            showToast('Backup importado com sucesso');
        } catch(err) { showToast('Erro: arquivo JSON inv\u00e1lido'); }
    };
    reader.readAsText(file); importFile.value = '';
});

// ── Plataformas ──
$('#btn-add-platform').addEventListener('click', () => { settingsMenu.classList.add('hidden'); openPlatformModal(); });

function openPlatformModal(editPlatform = null) {
    const modal = $('#platform-modal');
    const titleEl = $('#platform-modal-title');
    const nameInput = $('#platform-name');
    const colorInput = $('#platform-color');
    const hexSpan = $('#platform-color-hex');
    if (editPlatform) {
        titleEl.textContent = 'Editar plataforma'; nameInput.value = editPlatform.name;
        colorInput.value = editPlatform.color; hexSpan.textContent = editPlatform.color;
    } else {
        titleEl.textContent = 'Nova plataforma'; nameInput.value = '';
        colorInput.value = '#2DBF7F'; hexSpan.textContent = '#2DBF7F';
    }
    modal.classList.remove('hidden'); nameInput.focus();
    colorInput.oninput = () => { hexSpan.textContent = colorInput.value.toUpperCase(); };
    $('#platform-cancel').onclick = () => modal.classList.add('hidden');
    modal.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };
    $('#platform-save').onclick = () => {
        const name = nameInput.value.trim(); if (!name) { nameInput.focus(); return; }
        const color = colorInput.value;
        if (editPlatform) { const p = state.platforms.find(x => x.id === editPlatform.id); if (p) { p.name = name; p.color = color; } }
        else { state.platforms.push({ id: 'custom-' + uid(), name, color, builtin: false }); }
        saveState(); renderBoard(); modal.classList.add('hidden');
        showToast(editPlatform ? 'Plataforma atualizada' : 'Plataforma adicionada');
    };
}

$('#btn-manage-platforms').addEventListener('click', () => { settingsMenu.classList.add('hidden'); openManagePlatforms(); });

function openManagePlatforms() {
    const modal = $('#manage-platforms-modal');
    const list = $('#manage-platforms-list');
    const all = getAllPlatforms();
    list.innerHTML = all.map(p => {
        const isCustom = !p.builtin;
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border)">
            <div style="width:14px;height:14px;border-radius:4px;background:${p.color};flex-shrink:0"></div>
            <span style="flex:1;font-size:13px;color:var(--text)">${escapeHtml(p.name)}</span>
            <span style="font-size:11px;color:var(--text-muted)">${p.color}</span>
            ${isCustom ? `<button class="manage-edit" data-pid="${p.id}" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:4px 8px;border-radius:4px" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="manage-delete" data-pid="${p.id}" style="background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px 8px;border-radius:4px" title="Remover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>` : '<span style="font-size:11px;color:var(--text-muted);padding:4px 8px">padr\u00e3o</span>'}
        </div>`;
    }).join('');
    list.querySelectorAll('.manage-edit').forEach(btn => {
        btn.addEventListener('click', () => {
            const p = state.platforms.find(x => x.id === btn.dataset.pid);
            if (p) { modal.classList.add('hidden'); openPlatformModal(p); }
        });
    });
    list.querySelectorAll('.manage-delete').forEach(btn => {
        btn.addEventListener('click', () => {
            showConfirm('Remover plataforma', 'Deseja remover esta plataforma personalizada?', () => {
                state.platforms = state.platforms.filter(x => x.id !== btn.dataset.pid);
                state.cards.forEach(c => { if (c.platform === btn.dataset.pid) c.platform = 'outro'; });
                saveState(); renderBoard(); openManagePlatforms();
            });
        });
    });
    modal.classList.remove('hidden');
    $('#manage-platforms-close').onclick = () => modal.classList.add('hidden');
    modal.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };
}

// ── Alterar PIN ──
$('#btn-change-pin').addEventListener('click', () => {
    settingsMenu.classList.add('hidden');
    const modal = $('#pin-modal');
    $('#pin-current').value = ''; $('#pin-new').value = ''; $('#pin-confirm').value = '';
    const s = $('#pin-status'); s.textContent = ''; s.className = 'modal-status';
    modal.classList.remove('hidden'); $('#pin-current').focus();
});
$('#pin-cancel').addEventListener('click', () => $('#pin-modal').classList.add('hidden'));
$('#pin-modal').addEventListener('click', (e) => { if (e.target.id === 'pin-modal') $('#pin-modal').classList.add('hidden'); });
$('#pin-save').addEventListener('click', async () => {
    const s = $('#pin-status');
    const current = $('#pin-current').value, newPin = $('#pin-new').value, confirmPin = $('#pin-confirm').value;
    if (!/^\d{4}$/.test(current)) { s.textContent = 'PIN atual deve ter 4 d\u00edgitos.'; s.className = 'modal-status error'; return; }
    if (await hashPin(current) !== localStorage.getItem(PIN_KEY)) { s.textContent = 'PIN atual incorreto.'; s.className = 'modal-status error'; return; }
    if (!/^\d{4}$/.test(newPin)) { s.textContent = 'Novo PIN deve ter 4 d\u00edgitos.'; s.className = 'modal-status error'; return; }
    if (newPin !== confirmPin) { s.textContent = 'Os PINs n\u00e3o conferem.'; s.className = 'modal-status error'; return; }
    localStorage.setItem(PIN_KEY, await hashPin(newPin));
    s.textContent = 'PIN alterado com sucesso.'; s.className = 'modal-status success';
    setTimeout(() => $('#pin-modal').classList.add('hidden'), 1200);
});

// ── Limpar tudo ──
$('#btn-clear-all').addEventListener('click', () => {
    settingsMenu.classList.add('hidden');
    showConfirm('Limpar tudo', 'Todos os registros e plataformas personalizadas ser\u00e3o removidos. Esta a\u00e7\u00e3o n\u00e3o pode ser desfeita.', () => {
        state = { cards: [], platforms: [] }; saveState(); renderBoard(); showToast('Quadro limpo');
    });
});

// ── Inicialização ──
document.addEventListener('DOMContentLoaded', () => {
    setTheme(getTheme());
    updateDateTime();
    setInterval(updateDateTime, 10000);
    setupLockScreen();
});

})();
</script>
</body>
</html>
