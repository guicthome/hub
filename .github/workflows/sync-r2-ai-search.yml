name: Sync Hub content to R2 (AI Search)

on:
  workflow_run:
    workflows: ["Deploy VitePress site to Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = private
          no_check_bucket = true
          EOF

      - name: Sync indexable content to R2
        run: |
          BUCKET="hub-csv-knowledge"

          # Sync markdown, HTML, JSON, CSV, TXT files (skip large binaries )
          rclone sync . "r2:${BUCKET}/" \
            --include "*.md" \
            --include "*.html" \
            --include "*.json" \
            --include "*.csv" \
            --include "*.txt" \
            --include "*.pdf" \
            --exclude ".git/**" \
            --exclude "node_modules/**" \
            --exclude "docs/.vitepress/cache/**" \
            --exclude "package-lock.json" \
            --max-size 4M \
            --transfers 10 \
            --checkers 20 \
            --verbose

      - name: Trigger AI Search re-index
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/autorag/hub-csv/reindex" \
            -H "Authorization: Bearer ${{ secrets.CF_AI_SEARCH_TOKEN }}" \
            -H "Content-Type: application/json" || true
          echo "Re-index triggered."
