name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm install

      - name: Build with VitePress
        run: npm run docs:build

      - name: Regenerate manifest.json
        run: python3 scripts/generate-manifest.py .

      - name: Copy static content to dist
        run: |
          DIST=docs/.vitepress/dist

          # Save VitePress-built index pages (with nav + visual design)
          for dir in axia medvalor thera compliance founder unimed unihealth icds; do
            [ -f "$DIST/$dir/index.html" ] && cp "$DIST/$dir/index.html" "/tmp/vp_${dir}.html"
          done

          # Copy standalone HTML modules (sub-pages, dashboards, policies)
          cp -r axia "$DIST/" 2>/dev/null || true
          cp -r admin "$DIST/" 2>/dev/null || true
          cp -r scripts "$DIST/" 2>/dev/null || true
          cp -r medvalor "$DIST/" 2>/dev/null || true
          cp -r thera "$DIST/" 2>/dev/null || true
          cp -r unimed "$DIST/" 2>/dev/null || true
          cp -r unihealth "$DIST/" 2>/dev/null || true
          cp -r compliance "$DIST/" 2>/dev/null || true
          cp -r founder "$DIST/" 2>/dev/null || true
          cp -r icds "$DIST/" 2>/dev/null || true

          # Restore VitePress-built index pages (preserve SPA navigation)
          for dir in axia medvalor thera compliance founder unimed unihealth icds; do
            [ -f "/tmp/vp_${dir}.html" ] && cp "/tmp/vp_${dir}.html" "$DIST/$dir/index.html"
          done

          # Note: _infra is NOT copied here because VitePress builds it from docs/_infra/

          # Copy assets
          cp -r assets "$DIST/" 2>/dev/null || true

          # Copy root files
          cp CNAME "$DIST/" 2>/dev/null || true
          cp site.webmanifest "$DIST/" 2>/dev/null || true
          cp llms.txt "$DIST/" 2>/dev/null || true
          cp manifest.json "$DIST/" 2>/dev/null || true
          cp completeness-checklist.md "$DIST/" 2>/dev/null || true


      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
